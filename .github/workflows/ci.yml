name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        library-target-framework: [netstandard2.0, netstandard2.1, net6.0]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore BidirectionalDictionary.slnx

      - name: Build solution
        run: dotnet build BidirectionalDictionary.slnx --configuration Release -p:LibraryTargetFramework=${{ matrix.library-target-framework }} --no-restore

      - name: Run tests
        run: >
          dotnet test
          --solution BidirectionalDictionary.slnx
          --configuration Release
          -p:LibraryTargetFramework=${{ matrix.library-target-framework }}
          --no-build
          --
          --coverage
          --coverage-output-format cobertura
          --coverage-output coverage.${{ matrix.library-target-framework }}.cobertura.xml
          
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: '**/TestResults/coverage.cobertura.xml'
