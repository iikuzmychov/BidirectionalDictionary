name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore BidirectionalDictionary.slnx

      - name: Build solution
        run: dotnet build BidirectionalDictionary.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test BidirectionalDictionary.slnx --configuration Release --no-build
