name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore BidirectionalDictionary.slnx

      - name: Build solution
        run: dotnet build BidirectionalDictionary.slnx --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test --solution BidirectionalDictionary.slnx --configuration Release -p:LibraryTargetFramework=netstandard2.0 --no-restore
          dotnet test --solution BidirectionalDictionary.slnx --configuration Release -p:LibraryTargetFramework=netstandard2.1 --no-restore
          dotnet test --solution BidirectionalDictionary.slnx --configuration Release -p:LibraryTargetFramework=net6.0 --no-restore
          dotnet test --solution BidirectionalDictionary.slnx --configuration Release -p:LibraryTargetFramework=net9.0 --no-restore

      - name: Read package version
        id: version
        run: |
          $version = dotnet msbuild src/BidirectionalDictionary/BidirectionalDictionary.csproj -getProperty:Version
          "value=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Pack NuGet package
        run: dotnet pack src/BidirectionalDictionary/BidirectionalDictionary.csproj --configuration Release --no-build --output ${{ github.workspace }}/artifacts

      - name: Publish package to NuGet
        run: |
          for package in "${{ github.workspace }}"/artifacts/*.nupkg "${{ github.workspace }}"/artifacts/*.snupkg; do
            dotnet nuget push "$package" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
          done

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.value }}" "${{ github.workspace }}"/artifacts/*.nupkg "${{ github.workspace }}"/artifacts/*.snupkg --title "v${{ steps.version.outputs.value }}" --target "${{ github.sha }}"
